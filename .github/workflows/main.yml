name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kammy/docker-react -f Dockerfile.dev .

      - name: Run tests
        run: docker run -e CI=true kammy/docker-react npm run test -- --coverage

  deploy:
    needs: test
    # FIX: This now correctly checks if the event causing the run is a direct push to main
    if: github.event_name == 'push' 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: zip -r deploy.zip . -x "*.git*"
      - uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: frontend
          environment_name: Frontend-env
          region: us-east-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
